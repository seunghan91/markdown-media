<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDM Playground — Markdown+Media 라이브 데모</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --success: #3fb950;
      --warning: #d29922;
      --tag-bg: #1f2937;
      --code-bg: #0d1117;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #b88eff);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }
    .logo-text { font-size: 18px; font-weight: 700; }
    .logo-badge {
      background: var(--tag-bg);
      color: var(--muted);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .header-actions { margin-left: auto; display: flex; gap: 8px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, border-color .15s;
    }
    .btn:hover { background: var(--tag-bg); border-color: var(--accent); color: var(--accent); }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d1117;
      font-weight: 600;
    }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #0d1117; }

    /* ── Toolbar ── */
    .toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .toolbar-label { font-size: 12px; color: var(--muted); margin-right: 4px; }
    .example-btn {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--tag-bg);
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .example-btn:hover { color: var(--accent); border-color: var(--accent); }
    .example-btn.active { background: var(--accent); color: #0d1117; border-color: var(--accent); font-weight: 600; }

    .toolbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    .upload-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
      background: var(--accent); color: #0d1117; cursor: pointer;
      border: none; transition: background .15s; white-space: nowrap;
    }
    .upload-btn:hover { background: var(--accent-hover); }
    .upload-btn.loading { background: var(--warning); cursor: not-allowed; }

    /* ── Convert modal overlay ── */
    .convert-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    .convert-overlay.visible { display: flex; }
    .convert-modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 32px; width: 400px; max-width: 90vw;
      text-align: center;
    }
    .convert-modal h3 { margin-bottom: 12px; font-size: 16px; }
    .convert-modal p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    .convert-spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 0 auto 16px;
    }
    .convert-result { text-align: left; }
    .convert-result .result-stats {
      font-size: 12px; color: var(--muted); margin-bottom: 12px;
    }
    .convert-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .btn-load { padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; background: var(--accent); color: #0d1117; }
    .btn-cancel { padding: 8px 18px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-size: 14px; background: transparent; color: var(--text); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    .pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane + .pane { border-left: 1px solid var(--border); }

    .pane-header {
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .pane-header .status {
      font-size: 11px;
      color: var(--success);
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
    }
    .pane-header .status.error { color: #f85149; }

    /* ── Editor ── */
    #editor {
      flex: 1;
      width: 100%;
      background: var(--code-bg);
      color: var(--text);
      border: none;
      outline: none;
      resize: none;
      padding: 20px;
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.7;
      tab-size: 2;
    }

    /* ── Output pane ── */
    .output-tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 6px 16px;
      font-size: 12px;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all .15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    .output-panel {
      flex: 1;
      overflow: auto;
      display: none;
    }
    .output-panel.visible { display: block; }

    /* Preview panel */
    #preview-panel {
      padding: 24px;
      line-height: 1.7;
    }
    #preview-panel img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--tag-bg);
      padding: 4px;
    }
    #preview-panel video, #preview-panel audio { max-width: 100%; }
    #preview-panel figure { margin: 16px 0; }
    #preview-panel figcaption {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      font-style: italic;
    }
    #preview-panel .align-center { display: block; margin: 0 auto; }
    #preview-panel .align-left { float: left; margin-right: 16px; }
    #preview-panel .align-right { float: right; margin-left: 16px; }
    #preview-panel iframe { max-width: 100%; border-radius: 6px; }
    #preview-panel .mdm-placeholder {
      background: var(--tag-bg);
      border: 1px dashed var(--border);
      border-radius: 6px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* HTML panel */
    #html-panel {
      padding: 0;
      background: var(--code-bg);
    }
    #html-output {
      width: 100%;
      height: 100%;
      padding: 20px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      background: transparent;
      border: none;
      outline: none;
      resize: none;
    }

    /* Tokens panel */
    #tokens-panel {
      padding: 16px;
      background: var(--code-bg);
    }
    .token-list { display: flex; flex-direction: column; gap: 8px; }
    .token-item {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
    }
    .token-type {
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 4px;
    }
    .token-type.text { color: var(--muted); }
    .token-type.mdm-reference { color: var(--accent); }
    .token-value { font-family: var(--font-mono); color: var(--text); }
    .token-attrs { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
    .token-attr {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }
    .token-attr span { color: var(--success); }

    /* ── Footer ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    .footer-stat { display: flex; align-items: center; gap: 4px; }
    .stat-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
    .stat-dot.loading { background: var(--warning); }

    /* ── Syntax highlight helper classes ── */
    .hl-keyword { color: #ff7b72; }
    .hl-string { color: #a5d6ff; }
    .hl-number { color: #79c0ff; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .pane + .pane { border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>

<!-- Load MDM parser (UMD build) -->
<script>
// ── Inline fallback parser (no build step needed for playground) ──────────────
// This mirrors the core logic so playground works without a server.

class Tokenizer {
  constructor() {
    this.mdmPattern = /!\[\[([^\]]+)\]\]/g;
    this.refParts = /^([^:|]+)(?::([^|]+))?(?:\s*\|\s*(.+))?$/;
    this.attrPattern = /(\w[\w-]*)(?:=(?:"([^"]*)"|'([^']*)'|([^\s]+)))?/g;
  }

  tokenize(text) {
    const tokens = [];
    let lastIndex = 0;
    let match;
    this.mdmPattern.lastIndex = 0;

    while ((match = this.mdmPattern.exec(text)) !== null) {
      if (match.index > lastIndex) {
        tokens.push({ type: 'text', value: text.slice(lastIndex, match.index) });
      }
      try {
        const parsed = this.parseReference(match[1]);
        tokens.push({ type: 'mdm-reference', raw: match[0], ...parsed });
      } catch (e) {
        tokens.push({ type: 'text', value: match[0] });
      }
      lastIndex = match.index + match[0].length;
    }

    if (lastIndex < text.length) {
      tokens.push({ type: 'text', value: text.slice(lastIndex) });
    }
    return tokens;
  }

  parseReference(ref) {
    const m = ref.match(this.refParts);
    if (!m) throw new Error('Invalid reference: ' + ref);
    const [, name, preset, attrsStr] = m;
    return {
      name: name.trim(),
      preset: preset ? preset.trim() : null,
      attributes: attrsStr ? this.parseAttributes(attrsStr) : {}
    };
  }

  parseAttributes(str) {
    const attrs = {};
    let m;
    this.attrPattern.lastIndex = 0;
    while ((m = this.attrPattern.exec(str)) !== null) {
      const [, key, dq, sq, uq] = m;
      const raw = dq !== undefined ? dq : sq !== undefined ? sq : uq !== undefined ? uq : true;
      if (raw === true) { attrs[key] = true; }
      else if (raw === 'true') { attrs[key] = true; }
      else if (raw === 'false') { attrs[key] = false; }
      else if (/^\d+$/.test(raw)) { attrs[key] = parseInt(raw, 10); }
      else if (/^\d+\.\d+$/.test(raw)) { attrs[key] = parseFloat(raw); }
      else { attrs[key] = raw; }
    }
    return attrs;
  }
}

class Renderer {
  constructor(mdmData = null) { this.mdmData = mdmData; }

  render(tokens) { return tokens.map(t => this.renderToken(t)).join(''); }

  renderToken(t) {
    if (t.type === 'text') return t.value;
    if (t.type === 'mdm-reference') return this.renderMDMRef(t);
    return '';
  }

  renderMDMRef(t) {
    const { name, preset, attributes } = t;
    const resource = this.mdmData?.resources?.[name];
    if (!resource) return this.renderDirectFile(name, attributes);

    const presetAttrs = this.getPreset(resource, preset);
    const merged = { ...resource, ...presetAttrs, ...attributes };

    switch (resource.type) {
      case 'image': return this.renderImage(merged);
      case 'video': return this.renderVideo(merged);
      case 'audio': return this.renderAudio(merged);
      case 'embed': return this.renderEmbed(merged);
      default: return `<!-- Unknown type: ${resource.type} -->`;
    }
  }

  getPreset(resource, preset) {
    if (!preset) return {};
    if (resource.presets?.[preset]) return resource.presets[preset];
    if (this.mdmData?.presets?.[preset]) return this.mdmData.presets[preset];
    return {};
  }

  renderDirectFile(filename, attrs) {
    const ext = filename.split('.').pop().toLowerCase();
    if (['jpg','jpeg','png','gif','webp','svg'].includes(ext))
      return this.renderImage({ src: filename, ...attrs });
    if (['mp4','webm','ogv'].includes(ext))
      return this.renderVideo({ src: filename, ...attrs });
    if (['mp3','wav','ogg'].includes(ext))
      return this.renderAudio({ src: filename, ...attrs });
    // For demo: show placeholder
    return `<div class="mdm-placeholder">📎 ${this.esc(filename)}</div>`;
  }

  renderImage(a) {
    const parts = [];
    // For demo, show placeholder since no actual images
    const src = a.src || a.name || 'image';
    parts.push(`src="${this.esc(src)}"`);
    if (a.alt) parts.push(`alt="${this.esc(a.alt)}"`);
    if (a.width) parts.push(`width="${a.width}"`);
    if (a.height) parts.push(`height="${a.height}"`);
    if (a.loading) parts.push(`loading="${a.loading}"`);
    const styles = this.buildStyles(a);
    if (styles) parts.push(`style="${styles}"`);
    if (a.align) parts.push(`class="align-${a.align}"`);

    // For playground demo: use placeholder since no actual files
    const imgEl = `<img ${parts.join(' ')} onerror="this.style.background='#1f2937';this.style.minHeight='80px';this.style.display='block'" alt="${this.esc(a.alt || src)}">`;
    if (a.caption) return `<figure>${imgEl}<figcaption>${this.esc(a.caption)}</figcaption></figure>`;
    return imgEl;
  }

  renderVideo(a) {
    const parts = [];
    if (a.src) parts.push(`src="${this.esc(a.src)}"`);
    if (a.width) parts.push(`width="${a.width}"`);
    if (a.height) parts.push(`height="${a.height}"`);
    if (a.poster) parts.push(`poster="${this.esc(a.poster)}"`);
    ['controls','autoplay','muted','loop'].forEach(k => { if (a[k]) parts.push(k); });
    return `<video ${parts.join(' ')}></video>`;
  }

  renderAudio(a) {
    const parts = [];
    if (a.src) parts.push(`src="${this.esc(a.src)}"`);
    ['controls','autoplay','loop'].forEach(k => { if (a[k]) parts.push(k); });
    return `<audio ${parts.join(' ')}></audio>`;
  }

  renderEmbed(a) {
    if (a.provider === 'youtube') {
      const w = a.width || 560, h = a.height || 315;
      return `<iframe width="${w}" height="${h}" src="https://www.youtube.com/embed/${a.id}" frameborder="0" allowfullscreen style="border-radius:8px;max-width:100%"></iframe>`;
    }
    if (a.provider === 'vimeo') {
      const w = a.width || 640, h = a.height || 360;
      return `<iframe width="${w}" height="${h}" src="https://player.vimeo.com/video/${a.id}" frameborder="0" allowfullscreen style="border-radius:8px;max-width:100%"></iframe>`;
    }
    return `<!-- Unsupported embed: ${a.provider} -->`;
  }

  buildStyles(a) {
    const s = [];
    if (a['max-width']) s.push(`max-width:${a['max-width']}px`);
    if (a['object-fit']) s.push(`object-fit:${a['object-fit']}`);
    if (a.opacity) s.push(`opacity:${a.opacity}`);
    if (a.float) s.push(`float:${a.float}`);
    return s.join(';');
  }

  esc(str) {
    if (typeof str !== 'string') return String(str);
    return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
}

// ── YouTube resource for demo ────────────────────────────────────────────────
const DEMO_MDM_DATA = {
  resources: {
    'youtube-demo': { type: 'embed', provider: 'youtube', id: 'dQw4w9WgXcQ' }
  }
};

// ── Core ─────────────────────────────────────────────────────────────────────
const tokenizer = new Tokenizer();
const renderer = new Renderer(DEMO_MDM_DATA);
const editor = document.getElementById('editor');
const previewPanel = document.getElementById('preview-panel');
const htmlOutput = document.getElementById('html-output');
const tokenList = document.getElementById('token-list');
const tokenCountEl = document.getElementById('token-count');
const parseTimeEl = document.getElementById('parse-time');
const editorStatus = document.getElementById('editor-status');
const parserDot = document.getElementById('parser-dot');
const parserStatus = document.getElementById('parser-status');

// Parser ready
parserDot.classList.remove('loading');
parserStatus.textContent = '파서 준비 완료';

let debounceTimer;
let activeTab = 'preview';

function parse(text) {
  const t0 = performance.now();
  const tokens = tokenizer.tokenize(text);
  const html = renderer.render(tokens);
  const elapsed = (performance.now() - t0).toFixed(1);
  return { tokens, html, elapsed };
}

function formatHtml(html) {
  // Simple formatting
  return html
    .replace(/></g, '>\n<')
    .replace(/^/gm, '')
    .trim();
}

function renderTokenList(tokens) {
  return tokens.map(t => {
    if (t.type === 'text') {
      const preview = t.value.length > 60 ? t.value.slice(0, 60) + '…' : t.value;
      return `<div class="token-item">
        <div class="token-type text">TEXT</div>
        <div class="token-value">${escapeHtml(preview)}</div>
      </div>`;
    }
    const attrs = Object.entries(t.attributes || {});
    return `<div class="token-item">
      <div class="token-type mdm-reference">MDM-REFERENCE</div>
      <div class="token-value">
        name: <strong>${escapeHtml(t.name)}</strong>${t.preset ? ` &nbsp; preset: <strong>${escapeHtml(t.preset)}</strong>` : ''}
      </div>
      ${attrs.length ? `<div class="token-attrs">${attrs.map(([k,v]) =>
        `<div class="token-attr">${escapeHtml(k)}=<span>${escapeHtml(String(v))}</span></div>`
      ).join('')}</div>` : ''}
    </div>`;
  }).join('');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function update() {
  const text = editor.value;
  try {
    const { tokens, html, elapsed } = parse(text);
    const mdmRefs = tokens.filter(t => t.type === 'mdm-reference');

    // Update preview
    if (activeTab === 'preview') previewPanel.innerHTML = html;
    // Update HTML
    if (activeTab === 'html') htmlOutput.value = formatHtml(html);
    // Update tokens
    if (activeTab === 'tokens') tokenList.innerHTML = renderTokenList(tokens);

    tokenCountEl.textContent = `MDM 참조 ${mdmRefs.length}개 · 토큰 ${tokens.length}개`;
    parseTimeEl.textContent = `${elapsed}ms`;
    editorStatus.textContent = '파싱 완료';
    editorStatus.className = 'status';
  } catch (e) {
    editorStatus.textContent = '오류: ' + e.message;
    editorStatus.className = 'status error';
  }
}

editor.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  editorStatus.textContent = '입력 중…';
  debounceTimer = setTimeout(update, 150);
});

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.output-panel').forEach(p => p.classList.remove('visible'));
    tab.classList.add('active');
    activeTab = tab.dataset.tab;
    document.getElementById(activeTab + '-panel').classList.add('visible');
    update();
  });
});

// Examples
document.querySelectorAll('.example-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.example-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    editor.value = EXAMPLES[btn.dataset.example] || '';
    update();
  });
});

// Share button
document.getElementById('share-btn').addEventListener('click', () => {
  const url = new URL(window.location.href);
  url.searchParams.set('code', btoa(encodeURIComponent(editor.value)));
  navigator.clipboard.writeText(url.toString()).then(() => {
    const btn = document.getElementById('share-btn');
    btn.textContent = '✅ 복사됨!';
    setTimeout(() => btn.textContent = '🔗 공유', 2000);
  });
});

// Load from URL param
const urlParams = new URLSearchParams(window.location.search);
const urlCode = urlParams.get('code');
if (urlCode) {
  try {
    editor.value = decodeURIComponent(atob(urlCode));
  } catch (e) {
    editor.value = EXAMPLES.basic;
  }
} else {
  editor.value = EXAMPLES.basic;
}

// Initial render
update();

// ── File Convert ─────────────────────────────────────────────────────────────
const API_BASE = 'https://mdm-api.onrender.com';
const fileInput = document.getElementById('file-input');
const uploadLabel = document.getElementById('upload-label');
const overlay = document.getElementById('convert-overlay');
let convertedMarkdown = '';

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  fileInput.value = '';  // reset so same file can be picked again

  // show loading
  overlay.classList.add('visible');
  document.getElementById('convert-loading').style.display = '';
  document.getElementById('convert-done').style.display = 'none';
  document.getElementById('convert-error').style.display = 'none';
  document.getElementById('convert-filename').textContent = file.name;
  uploadLabel.classList.add('loading');

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch(`${API_BASE}/api/convert`, {
      method: 'POST',
      body: formData,
    });
    const data = await res.json();

    if (!res.ok) throw new Error(data.detail || '서버 오류');

    convertedMarkdown = data.markdown;

    // show result
    document.getElementById('convert-loading').style.display = 'none';
    document.getElementById('convert-done').style.display = '';
    document.getElementById('convert-done-title').textContent = `${data.filename} 변환 완료`;
    document.getElementById('convert-stats').textContent =
      `문자 ${data.stats.chars.toLocaleString()}자 · 이미지 ${data.stats.images}개`;

  } catch (err) {
    document.getElementById('convert-loading').style.display = 'none';
    document.getElementById('convert-error').style.display = '';
    document.getElementById('convert-error-msg').textContent =
      err.message.includes('Failed to fetch')
        ? 'API 서버에 연결할 수 없습니다. 잠시 후 다시 시도하세요.'
        : err.message;
  } finally {
    uploadLabel.classList.remove('loading');
  }
});

document.getElementById('convert-load').addEventListener('click', () => {
  editor.value = convertedMarkdown;
  overlay.classList.remove('visible');
  update();
});
document.getElementById('convert-cancel').addEventListener('click', () => overlay.classList.remove('visible'));
document.getElementById('convert-error-cancel').addEventListener('click', () => overlay.classList.remove('visible'));
overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('visible'); });
</script>
</body>
