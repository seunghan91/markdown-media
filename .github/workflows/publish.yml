name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "What to publish"
        required: true
        type: choice
        options:
          - pypi
          - crates
          - npm
          - all

jobs:
  # ── PyPI: Rust-powered Python package (maturin) ──
  publish-pypi:
    name: PyPI (${{ matrix.os }})
    if: github.event.inputs.target == 'pypi' || github.event.inputs.target == 'all' || github.event_name == 'release'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: packages/python
          args: --release --out dist
          target: ${{ matrix.target }}
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: packages/python/dist/*.whl

  publish-pypi-upload:
    name: Upload to PyPI
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  # ── crates.io: Rust core library ──
  publish-crates:
    name: crates.io
    if: github.event.inputs.target == 'crates' || github.event.inputs.target == 'all' || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        run: cargo test --manifest-path core/Cargo.toml --lib
      - name: Publish
        run: cargo publish --manifest-path core/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ── npm: WASM core + JS viewer ──
  publish-npm:
    name: npm
    if: github.event.inputs.target == 'npm' || github.event.inputs.target == 'all' || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish @markdown-media/wasm
        working-directory: core/pkg
        run: npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @markdown-media/viewer
        working-directory: packages/viewer-js
        run: |
          npm install
          npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
