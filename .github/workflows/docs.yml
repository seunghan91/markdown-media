name: GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - "docs/**"
      - "playground/**"
      - "converter/**"
      - "viewer/**"
      - "core/pkg/**"
      - "README.md"
      - "start.md"
      - "start.ko.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build @markdown-media/viewer (dist)
        working-directory: packages/viewer-js
        run: |
          npm install
          npm run build:prod

      - name: Prepare Pages output
        run: |
          mkdir -p _site

          # Landing page
          cp docs/index.html _site/index.html

          # Playground
          mkdir -p _site/playground
          cp playground/index.html _site/playground/

          # Viewer
          mkdir -p _site/viewer
          cp viewer/index.html _site/viewer/

          # Converter (WASM demo)
          mkdir -p _site/converter
          cp converter/index.html _site/converter/
          cp core/pkg/mdm_core.js _site/converter/mdm_core.js
          cp core/pkg/mdm_core_bg.wasm _site/converter/mdm_core_bg.wasm

          # Viewer dist (CDN-accessible from playground)
          mkdir -p _site/dist
          cp packages/viewer-js/dist/index.umd.js _site/dist/mdm-viewer.umd.js
          cp packages/viewer-js/dist/index.browser.mjs _site/dist/mdm-viewer.mjs

          echo "Site prepared:"
          find _site -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
