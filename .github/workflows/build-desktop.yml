name: Build Desktop App

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

env:
  WORKING_DIR: desktop

jobs:
  build:
    name: Build - ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_path: src-tauri/target/release/bundle
          - platform: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            bundle_path: src-tauri/target/aarch64-apple-darwin/release/bundle
          - platform: macos-x64
            runner: macos-latest
            target: x86_64-apple-darwin
            bundle_path: src-tauri/target/x86_64-apple-darwin/release/bundle
          - platform: linux
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle_path: src-tauri/target/release/bundle

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '${{ env.WORKING_DIR }}/src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm install

      - name: Import macOS signing certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 20)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build Tauri app (Windows)
        if: matrix.platform == 'windows'
        working-directory: ${{ env.WORKING_DIR }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Build Tauri app (macOS - signed + notarized)
        if: startsWith(matrix.platform, 'macos')
        working-directory: ${{ env.WORKING_DIR }}
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: seunghan kim (AVMJBATWAT)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: "AVMJBATWAT"
        run: npx tauri build --target ${{ matrix.target }}

      - name: Build Tauri app (Linux)
        if: matrix.platform == 'linux'
        working-directory: ${{ env.WORKING_DIR }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Cleanup macOS keychain
        if: startsWith(matrix.platform, 'macos') && always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: mdm-desktop-windows
          path: |
            ${{ env.WORKING_DIR }}/${{ matrix.bundle_path }}/msi/*.msi
            ${{ env.WORKING_DIR }}/${{ matrix.bundle_path }}/nsis/*.exe
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: mdm-desktop-${{ matrix.platform }}
          path: |
            ${{ env.WORKING_DIR }}/${{ matrix.bundle_path }}/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: mdm-desktop-linux
          path: |
            ${{ env.WORKING_DIR }}/${{ matrix.bundle_path }}/deb/*.deb
            ${{ env.WORKING_DIR }}/${{ matrix.bundle_path }}/appimage/*.AppImage
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
